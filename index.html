<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>willcall — Doors opening soon</title>
  <meta name="description" content="willcall — Doors opening soon. Get on the list.">
  <meta property="og:title" content="willcall — Doors opening soon">
  <meta property="og:description" content="Doors opening soon. Get on the list.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon_io/favicon-16x16.png">
  <link rel="shortcut icon" href="/assets/favicon_io/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon_io/apple-touch-icon.png">
  <link rel="manifest" href="/assets/favicon_io/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F8F8F4;
      --text: #1f1e1d;
      --text-soft: #2c2928;
      --muted: #5c5955;
      --border: #f0ede7;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    html {
      height: 100%;
      background: var(--bg);
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100dvh;
      padding: 157px 24px 64px;
      position: relative;
      background-image: url('/assets/landingBGposters.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background-image: url('/assets/landingBG.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    .page > *:not(.bg-overlay) {
      position: relative;
      z-index: 1;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 520px;
      width: 100%;
    }

    .brand {
      width: clamp(200px, 40vw, 380px);
      height: auto;
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.8s ease forwards;
    }

    .tagline {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-soft);
      margin-bottom: 60px;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.8s ease 0.15s forwards;
    }

    .subtitle {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.8s ease 0.22s forwards;
    }

    .form-wrap {
      width: 100%;
      max-width: 393px;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.8s ease 0.3s forwards;
    }

    .form-wrap input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 2px;
      outline: none;
      background: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--text);
      height: 53px;
      padding: 0 16px;
    }

    .form-wrap input:focus-visible {
      border-color: var(--text);
      outline: 6px solid rgba(168, 164, 156, 0.25);
      outline-offset: -2px;
    }

    .form-wrap input::placeholder {
      color: var(--muted);
    }

    .form-wrap button {
      width: 100%;
      border: none;
      background: var(--text);
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 24px;
      margin-top: 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .form-wrap button:focus-visible {
      outline: 6px solid rgba(168, 164, 156, 0.25);
      outline-offset: -2px;
    }

    .form-wrap button:hover {
      opacity: 0.85;
    }

    .form-wrap button:active {
      transform: scale(0.97);
    }

    .form-wrap button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .success-msg {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 32px 0;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    .success-msg p {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin: 0;
    }

    .success-msg.show {
      display: flex;
    }

    .doorguy {
      width: 100px;
      height: auto;
      margin-bottom: 16px;
    }

    .error-msg {
      display: none;
      font-size: 13px;
      color: #950000;
      margin-top: 12px;
    }

    .error-msg.show {
      display: block;
    }

    footer {
      text-align: center;
      font-size: 14px;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.6s forwards;
    }

    footer a {
      color: var(--text);
      font-weight: 500;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: rgba(0,0,0,0.3);
    }

    footer a:focus-visible {
      outline: 4px solid rgba(168, 164, 156, 0.25);
      outline-offset: 2px;
      border-radius: 2px;
    }

    .footer-sep {
      color: var(--text);
      margin: 0 10px;
    }

    html.dark { background: #1a1a1a; }
    body.dark { background: #1a1a1a; color: #fff; }
    body.dark .page { background-image: url('/assets/landingBGDark.png'); }
    body.dark .bg-overlay { opacity: 0; }
    body.dark .brand { filter: invert(1); }
    body.dark .tagline { color: rgba(255,255,255,0.75); }
    body.dark .subtitle { color: rgba(255,255,255,0.85); }
    body.dark .success-msg p { color: #fff; }
    body.dark footer a { color: rgba(255,255,255,0.65); }
    body.dark footer a:hover { color: #fff; text-decoration-color: rgba(255,255,255,0.4); }
    body.dark .footer-sep { color: rgba(255,255,255,0.4); }
    body.dark footer a:focus-visible,
    body.dark .form-wrap input:focus-visible,
    body.dark .form-wrap button:focus-visible { outline-color: rgba(168, 164, 156, 0.25); }

    html, body, .tagline, .subtitle, footer a, .success-msg p {
      transition: background-color 0.6s ease, color 0.6s ease, text-decoration-color 0.4s ease;
    }

    .brand {
      transition: filter 0.6s ease;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @media (max-width: 600px) {
      .page {
        padding: 80px 20px 40px;
      }
      .tagline {
        font-size: 15px;
        margin-bottom: 44px;
      }
      .subtitle {
        font-size: 20px;
        margin-bottom: 28px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="page" id="page">
    <div class="bg-overlay" id="bgOverlay"></div>
    <main class="content">
      <h1>
        <img src="/assets/willcall-logo.svg" alt="willcall" class="brand">
      </h1>
      <p class="tagline">Track your shows. Share your story.</p>
      <p class="subtitle">Doors opening soon</p>
      <div class="form-wrap" id="formWrap">
        <form id="waitlistForm" autocomplete="off">
          <label for="emailInput" class="visually-hidden">Email address</label>
          <input type="email" id="emailInput" placeholder="Enter your email" required autocomplete="email">
          <button type="submit" id="submitBtn">Get on the list</button>
        </form>
        <p class="error-msg" id="errorMsg" role="alert" aria-live="assertive"></p>
      </div>
      <div class="success-msg" id="successMsg" role="status" aria-live="polite">
        <img src="/assets/doorguy.svg" class="doorguy" alt="">
        <p>You're on the list.</p>
      </div>
    </main>
    <footer>
      <a href="https://www.kathleenstonedesign.com" target="_blank" rel="noopener noreferrer">K. Stone</a>
      <span class="footer-sep">|</span>
      <a href="/privacy">Privacy</a>
    </footer>
  </div>

  <script>
    var form = document.getElementById('waitlistForm');
    var input = document.getElementById('emailInput');
    var btn = document.getElementById('submitBtn');
    var success = document.getElementById('successMsg');
    var error = document.getElementById('errorMsg');
    var formWrap = document.getElementById('formWrap');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      var email = input.value.trim();
      if (!email) return;

      btn.disabled = true;
      btn.textContent = '...';
      error.textContent = '';
      error.classList.remove('show');

      try {
        var res = await fetch('/api/waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        });
        var data = await res.json();

        if (!res.ok || data.error) {
          error.textContent = data.error || 'Something went wrong. Try again.';
          error.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Get on the list';
          return;
        }

        document.documentElement.classList.add('dark');
        document.body.classList.add('dark');
        formWrap.style.display = 'none';
        success.classList.add('show');
      } catch (err) {
        error.textContent = 'Something went wrong. Try again.';
        error.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Get on the list';
      }
    });
  </script>

  <script>
    (function() {
      var hasHover = window.matchMedia('(hover: hover)').matches;
      if (!hasHover) return;

      var overlay = document.getElementById('bgOverlay');
      var page = document.getElementById('page');

      var targetX = 0, targetY = 0;
      var currentX = 0, currentY = 0;
      var targetRadius = 0, currentRadius = 0;
      var active = false;
      var rafId = null;

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function updateMask() {
        if (currentRadius < 1) {
          overlay.style.webkitMaskImage = 'none';
          overlay.style.maskImage = 'none';
          if (!active) { rafId = null; return; }
        } else {
          var r = currentRadius;
          var mask = 'radial-gradient(circle ' + r + 'px at ' + currentX + 'px ' + currentY + 'px, transparent 0%, transparent 25%, rgba(0,0,0,0.6) 55%, black 75%)';
          overlay.style.webkitMaskImage = mask;
          overlay.style.maskImage = mask;
        }
        rafId = requestAnimationFrame(tick);
      }

      function tick() {
        currentX = targetX;
        currentY = targetY;
        currentRadius = lerp(currentRadius, targetRadius, active ? 0.3 : 0.06);
        updateMask();
      }

      page.addEventListener('mousemove', function(e) {
        var rect = page.getBoundingClientRect();
        targetX = e.clientX - rect.left;
        targetY = e.clientY - rect.top;
        targetRadius = 130;

        if (!active) {
          active = true;
          currentX = targetX;
          currentY = targetY;
          if (!rafId) rafId = requestAnimationFrame(tick);
        }
      });

      page.addEventListener('mouseleave', function() {
        active = false;
        targetRadius = 0;
        if (!rafId) rafId = requestAnimationFrame(tick);
      });
    })();
  </script>
</body>
</html>
