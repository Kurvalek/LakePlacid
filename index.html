<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>willcall — Doors opening soon</title>
  <meta name="description" content="willcall — Doors opening soon. Get on the list.">

  <meta property="og:description" content="Doors opening soon. Get on the list.">

  <meta property="og:image" content="https://willcall.app/assets/ogImage.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="willcall — Doors opening soon">
  <meta name="twitter:description" content="Doors opening soon. Get on the list.">
  <meta name="twitter:image" content="https://willcall.app/assets/ogImage.png">
  <link rel="canonical" href="https://willcall.app/">
  <link rel="preload" href="/assets/landingBGDark.png" as="image">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon_io/favicon-16x16.png">
  <link rel="shortcut icon" href="/assets/favicon_io/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon_io/apple-touch-icon.png">
  <link rel="manifest" href="/assets/favicon_io/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F8F8F4;
      --text: #1f1e1d;
      --text-soft: #2c2928;
      --muted: #5c5955;
      --border: #f0ede7;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    html {
      height: 100%;
      background: var(--bg);
      overscroll-behavior: none;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100dvh;
      padding: 157px 24px 64px;
      position: relative;
      background-image: url('/assets/landingBGposters.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background-image: url('/assets/landingBG.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    .page > *:not(.bg-overlay) {
      position: relative;
      z-index: 1;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 520px;
      width: 100%;
    }

    .brand {
      width: clamp(200px, 40vw, 380px);
      height: auto;
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.8s ease forwards;
    }

    .tagline {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 18px;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.8s ease 0.15s forwards;
    }

    .subtitle {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 62px;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.8s ease 0.22s forwards;
    }

    .form-wrap {
      width: 100%;
      max-width: 393px;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.8s ease 0.3s forwards;
    }

    .form-wrap input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 2px;
      outline: none;
      background: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--text);
      height: 53px;
      padding: 0 16px;
    }

    .form-wrap input:focus-visible {
      border-color: var(--text);
      outline: 6px solid rgba(168, 164, 156, 0.25);
      outline-offset: -2px;
    }

    .form-wrap input::placeholder {
      color: var(--muted);
    }

    .form-wrap button {
      width: 100%;
      border: none;
      background: var(--text);
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 24px;
      margin-top: 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .form-wrap button:focus-visible {
      outline: 6px solid rgba(168, 164, 156, 0.25);
      outline-offset: -2px;
    }

    .form-wrap button:hover {
      opacity: 0.85;
    }

    .form-wrap button:active {
      transform: scale(0.97);
    }

    .form-wrap button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .success-msg {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 62px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    .success-msg p {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin: 0;
    }

    .success-msg.show {
      display: flex;
    }

    .backstage-toast {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 44px;
      opacity: 0;
      transform: translateY(10px);
      animation: toastBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s forwards;
    }

    .toast-main {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
    }

    .toast-main strong {
      font-weight: 700;
      color: #fff;
    }

    .toast-sub {
      font-size: 12px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      margin-top: 4px;
    }

    @keyframes toastBounce {
      0% { opacity: 0; transform: translateY(10px); }
      50% { opacity: 1; transform: translateY(-4px); }
      70% { transform: translateY(2px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .error-msg {
      display: none;
      font-size: 13px;
      color: #950000;
      margin-top: 12px;
    }

    .error-msg.show {
      display: block;
    }

    footer {
      text-align: center;
      font-size: 14px;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.6s forwards;
    }

    footer a {
      color: var(--text);
      font-weight: 500;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: rgba(0,0,0,0.3);
    }

    footer a:focus-visible {
      outline: 4px solid rgba(168, 164, 156, 0.25);
      outline-offset: 2px;
      border-radius: 2px;
    }

    .footer-sep {
      color: var(--text);
      margin: 0 10px;
    }

    html.dark { background: #1a1a1a; }
    body.dark { background: #1a1a1a; color: #fff; }
    body.dark .bg-overlay { background-image: url('/assets/landingBGDark.png'); }
    body.dark .brand { filter: invert(1); }
    body.dark .tagline { color: #f5f3ee; }
    body.dark .subtitle { display: none; }
    body.dark .success-msg p { color: #fff; }
    body.dark footer a { color: rgba(255,255,255,0.65); }
    body.dark footer a:hover { color: #000; text-decoration-color: rgba(0,0,0,0.3); }
    body.dark .footer-sep { color: rgba(255,255,255,0.4); }
    body.dark footer a:focus-visible,
    body.dark .form-wrap input:focus-visible,
    body.dark .form-wrap button:focus-visible { outline-color: rgba(168, 164, 156, 0.25); }

    html, body, .tagline, .subtitle, footer a, .success-msg p {
      transition: background-color 0.6s ease, color 0.6s ease, text-decoration-color 0.4s ease;
    }

    .brand {
      transition: filter 0.6s ease;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @media (max-width: 600px) {
      .page {
        padding: 80px 20px 40px;
      }
      .tagline {
        font-size: 17px;
        margin-bottom: 18px;
      }
      .subtitle {
        font-size: 16px;
        margin-bottom: 64px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="page" id="page">
    <div class="bg-overlay" id="bgOverlay"></div>
    <main class="content">
      <h1>
        <img src="/assets/willcall-logo.svg" alt="willcall" class="brand">
      </h1>
      <p class="tagline">Track your shows. Share your story.</p>
      <p class="subtitle">Doors opening soon.</p>
      <div class="form-wrap" id="formWrap">
        <form id="waitlistForm" autocomplete="off">
          <label for="emailInput" class="visually-hidden">Email address</label>
          <input type="email" id="emailInput" placeholder="Enter your email" required autocomplete="email">
          <button type="submit" id="submitBtn">Get on the list</button>
        </form>
        <p class="error-msg" id="errorMsg" role="alert" aria-live="assertive"></p>
      </div>
      <div class="success-msg" id="successMsg" role="status" aria-live="polite">
        <p>You're on the list.</p>
        <div class="backstage-toast" id="backstageToast">
          <span class="toast-main">Type <strong>backstage</strong> to access</span>
          <span class="toast-sub">(or click the link below)</span>
        </div>
      </div>
    </main>
    <footer>
      <a href="https://www.kathleenstonedesign.com" target="_blank" rel="noopener noreferrer">K. Stone</a>
      <span class="footer-sep">|</span>
      <a href="https://go.willcall.app">Backstage</a>
      <span class="footer-sep">|</span>
      <a href="/privacy">Privacy</a>
    </footer>
  </div>

  <script>
    var form = document.getElementById('waitlistForm');
    var input = document.getElementById('emailInput');
    var btn = document.getElementById('submitBtn');
    var success = document.getElementById('successMsg');
    var error = document.getElementById('errorMsg');
    var formWrap = document.getElementById('formWrap');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      var email = input.value.trim();
      if (!email) return;

      btn.disabled = true;
      btn.textContent = '...';
      error.textContent = '';
      error.classList.remove('show');

      try {
        var res = await fetch('/api/waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        });
        var data = await res.json();

        if (!res.ok || data.error) {
          error.textContent = data.error || 'Something went wrong. Try again.';
          error.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Get on the list';
          return;
        }

        document.documentElement.classList.add('dark');
        document.body.classList.add('dark');
        formWrap.style.display = 'none';
        success.classList.add('show');
      } catch (err) {
        error.textContent = 'Something went wrong. Try again.';
        error.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Get on the list';
      }
    });
  </script>

  <script>
    (function() {
      if (!window.matchMedia('(pointer: fine)').matches) return;

      var SECRET = 'backstage';
      var buffer = '';
      var subtitle = document.querySelector('.subtitle');
      var originalText = subtitle ? subtitle.textContent : '';

      function onKey(e) {
        var el = document.activeElement;
        if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) return;

        var key = e.key.toLowerCase();
        if (key.length !== 1) return;

        buffer = (buffer + key).slice(-SECRET.length);

        if (buffer === SECRET) {
          buffer = '';
          document.removeEventListener('keydown', onKey);
          window.location.href = 'https://go.willcall.app';
        }
      }

      document.addEventListener('keydown', onKey);

    })();
  </script>

  <script>
    (function() {
      var hasHover = window.matchMedia('(hover: hover)').matches;
      if (!hasHover) return;

      var overlay = document.getElementById('bgOverlay');
      var page = document.getElementById('page');

      var targetX = 0, targetY = 0;
      var currentX = 0, currentY = 0;
      var targetRadius = 0, currentRadius = 0;
      var active = false;
      var rafId = null;

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function updateMask() {
        if (currentRadius < 1) {
          overlay.style.webkitMaskImage = 'none';
          overlay.style.maskImage = 'none';
          if (!active) { rafId = null; return; }
        } else {
          var r = currentRadius;
          var mask = 'radial-gradient(circle ' + r + 'px at ' + currentX + 'px ' + currentY + 'px, transparent 0%, transparent 25%, rgba(0,0,0,0.6) 55%, black 75%)';
          overlay.style.webkitMaskImage = mask;
          overlay.style.maskImage = mask;
        }
        rafId = requestAnimationFrame(tick);
      }

      function tick() {
        currentX = targetX;
        currentY = targetY;
        currentRadius = lerp(currentRadius, targetRadius, active ? 0.3 : 0.06);
        updateMask();
      }

      page.addEventListener('mousemove', function(e) {
        var rect = page.getBoundingClientRect();
        targetX = e.clientX - rect.left;
        targetY = e.clientY - rect.top;
        targetRadius = 130;

        if (!active) {
          active = true;
          currentX = targetX;
          currentY = targetY;
          if (!rafId) rafId = requestAnimationFrame(tick);
        }
      });

      page.addEventListener('mouseleave', function() {
        active = false;
        targetRadius = 0;
        if (!rafId) rafId = requestAnimationFrame(tick);
      });
    })();
  </script>

  <script>
    (function() {
      var hasFinePointer = window.matchMedia('(pointer: fine)').matches;
      var hasCoarsePointer = window.matchMedia('(pointer: coarse)').matches;
      var hasHover = window.matchMedia('(hover: hover)').matches;
      var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      if (hasFinePointer && !hasCoarsePointer) return;

      var isHybrid = hasFinePointer && hasCoarsePointer;

      var overlay = document.getElementById('bgOverlay');
      var page = document.getElementById('page');

      var currentX = 0, currentY = 0;
      var currentRadius = 0;
      var mode = 'idle';
      var driftTimeOffset = 0;
      var driftStartTime = 0;
      var rafId = null;
      var visible = true;
      var resumeTimer = null;

      var DRIFT_RADIUS = 165;
      var TOUCH_RADIUS = 95;

      function lerp(a, b, t) { return a + (b - a) * t; }

      function applyMask() {
        if (currentRadius < 1) {
          overlay.style.webkitMaskImage = 'none';
          overlay.style.maskImage = 'none';
        } else {
          var mask = 'radial-gradient(circle ' + currentRadius + 'px at ' + currentX + 'px ' + currentY + 'px, transparent 0%, transparent 25%, rgba(0,0,0,0.6) 55%, black 75%)';
          overlay.style.webkitMaskImage = mask;
          overlay.style.maskImage = mask;
        }
      }

      function driftPos(time) {
        var w = page.offsetWidth;
        var h = page.offsetHeight;
        return {
          x: w / 2 + Math.sin(time * 0.0004) * (w * 0.3),
          y: h / 2 + Math.sin(time * 0.0006) * (h * 0.2)
        };
      }

      function tick(ts) {
        if (!visible || mode === 'stopped' || mode === 'idle') {
          rafId = null;
          return;
        }

        if (mode === 'drift') {
          var pos = driftPos(ts - driftStartTime + driftTimeOffset);
          currentX = pos.x;
          currentY = pos.y;
          currentRadius = lerp(currentRadius, DRIFT_RADIUS, 0.03);
        } else if (mode === 'touch') {
          currentRadius = lerp(currentRadius, TOUCH_RADIUS, 0.15);
        } else if (mode === 'fadeout') {
          currentRadius = lerp(currentRadius, 0, 0.04);
          if (currentRadius < 1) {
            currentRadius = 0;
            applyMask();
            mode = 'idle';
            rafId = null;
            return;
          }
        }

        applyMask();
        rafId = requestAnimationFrame(tick);
      }

      function ensureRunning() {
        if (!rafId) rafId = requestAnimationFrame(tick);
      }

      function startDrift() {
        if (mode === 'stopped' || prefersReducedMotion) return;
        mode = 'drift';
        driftStartTime = performance.now();
        ensureRunning();
      }

      function startDriftFromCurrent() {
        if (mode === 'stopped' || prefersReducedMotion) return;
        var w = page.offsetWidth;
        var cx = w / 2;
        var normX = Math.max(-1, Math.min(1, (currentX - cx) / (w * 0.3)));
        driftTimeOffset = Math.asin(normX) / 0.0004;
        mode = 'drift';
        driftStartTime = performance.now();
        ensureRunning();
      }

      function stop() {
        mode = 'stopped';
        currentRadius = 0;
        applyMask();
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        if (resumeTimer) { clearTimeout(resumeTimer); resumeTimer = null; }
      }

      page.addEventListener('touchstart', function(e) {
        if (mode === 'stopped') return;
        if (resumeTimer) { clearTimeout(resumeTimer); resumeTimer = null; }
        var touch = e.touches[0];
        var rect = page.getBoundingClientRect();
        currentX = touch.clientX - rect.left;
        currentY = touch.clientY - rect.top;
        mode = 'touch';
        ensureRunning();
      }, { passive: true });

      page.addEventListener('touchmove', function(e) {
        if (mode !== 'touch') return;
        e.preventDefault();
        var touch = e.touches[0];
        var rect = page.getBoundingClientRect();
        currentX = touch.clientX - rect.left;
        currentY = touch.clientY - rect.top;
      }, { passive: false });

      page.addEventListener('touchend', function() {
        if (mode !== 'touch') return;
        page.style.touchAction = '';
        mode = 'fadeout';
        resumeTimer = setTimeout(function() {
          resumeTimer = null;
          startDriftFromCurrent();
        }, 2000);
      });

      document.addEventListener('visibilitychange', function() {
        visible = !document.hidden;
        if (visible && mode === 'drift') {
          driftStartTime = performance.now();
          ensureRunning();
        }
        if (visible && mode === 'fadeout') ensureRunning();
      });

      if (!isHybrid && !prefersReducedMotion) {
        startDrift();
      }
    })();
  </script>
</body>
</html>
